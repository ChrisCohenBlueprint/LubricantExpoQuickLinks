<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | Lubricant Expo</title>
    <meta name="description" content="All our links in one place. Connected and tracked.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Premium Neural Background -->
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
    </div>

    <main class="app-container">
        <header class="hero-section">
            <div class="logo-wrapper">
                <img src="logo-icon.png" class="hero-logo" alt="Logo" onerror="this.src='../logo-icon.png'">
            </div>
            <h1 class="logo-text">Lubricant<span> Expo</span></h1>
            <p class="subtitle">Global Asset Sharing Network</p>
        </header>

        <section class="links-container" id="links-list">
            <!-- Dynamically populated by script.js -->
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Loading connections...</p>
            </div>
        </section>

        <footer class="legal-footer">
            <p>&copy; 2026 Lubricant Expo. All our links in one place.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>

</html>
